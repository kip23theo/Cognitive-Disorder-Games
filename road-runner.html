<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ FIXED VIEWPORT (NO ZOOM BUG) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Road Runner Fixed</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  color: white;
  height: 100vh;
  overflow: hidden;
  font-family: sans-serif;
}

/* MAIN LAYOUT */
.game-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* GAME AREA */
.road-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ✅ FIX: KEEP PERFECT RATIO */
.game-box {
  aspect-ratio: 9 / 16;
  height: 100%;
  max-height: 100vh;
  width: auto;
  background: #2d3748;
  position: relative;
}

/* CANVAS */
canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* RIGHT PANEL */
.right-col {
  width: clamp(120px, 25vw, 180px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 10px;
}

/* BUTTONS */
button {
  padding: 15px;
  margin: 5px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  color: white;
}

#leftBtn {
  background: red;
}

#rightBtn {
  background: blue;
}

</style>
</head>

<body>

<div class="game-layout">

  <!-- GAME -->
  <div class="road-wrapper">
    <div class="game-box">
      <canvas id="game"></canvas>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="right-col">
    <div>
      <h3>Score: <span id="score">0</span></h3>
    </div>

    <div>
      <button id="leftBtn">← Left</button>
      <button id="rightBtn">Right →</button>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H;

/* ✅ FIXED RESIZE (NO DISTORTION) */
function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  W = canvas.width;
  H = canvas.height;
}
window.addEventListener("resize", resize);
resize();

/* GAME STATE */
let car = {
  x: 0,
  y: 0,
  lane: 0
};

/* LANES */
function getLaneX(lane) {
  return lane === 0 ? W * 0.3 : W * 0.7;
}

/* INIT */
function init() {
  car.y = H * 0.75;
  car.lane = 0;
  car.x = getLaneX(car.lane);
}
init();

/* CONTROLS */
document.getElementById("leftBtn").onclick = () => {
  car.lane = 0;
};
document.getElementById("rightBtn").onclick = () => {
  car.lane = 1;
};

/* DRAW CAR */
function drawCar() {
  const cw = W * 0.18;   // ✅ FIXED SIZE
  const ch = H * 0.22;

  car.x += (getLaneX(car.lane) - car.x) * 0.2;

  ctx.fillStyle = "cyan";
  ctx.fillRect(car.x - cw / 2, car.y, cw, ch);
}

/* LOOP */
function loop() {
  ctx.clearRect(0, 0, W, H);

  /* ROAD */
  ctx.fillStyle = "#333";
  ctx.fillRect(W * 0.1, 0, W * 0.8, H);

  /* CENTER LINE */
  ctx.fillStyle = "yellow";
  ctx.fillRect(W * 0.49, 0, W * 0.02, H);

  drawCar();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
